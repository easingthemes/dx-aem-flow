# Eval Gates — blocks prompt/rule regressions in CI
#
# Tier 1: Runs 30 golden fixtures through 7 deterministic gates (blocking).
# Tier 2: LLM-as-judge pairwise comparison (non-blocking, trend-tracking).
# Exit code 1 if any Tier 1 gate fails.

trigger:
  paths:
    include:
      - .ai/rules/*.md
      - .ai/automation/scripts/**
      - .ai/automation/agents/**
      - .ai/automation/eval/**
      - .ai/automation/policy/pipeline-policy.yaml

pr:
  paths:
    include:
      - .ai/rules/*.md
      - .ai/automation/scripts/**
      - .ai/automation/agents/**
      - .ai/automation/eval/**
      - .ai/automation/policy/pipeline-policy.yaml

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 1

  - task: UseNode@1
    inputs:
      version: "20.x"
    displayName: "Use Node.js 20.x"

  - bash: node .ai/automation/eval/run.js --all
    displayName: "Run Tier 1 eval gates"
    workingDirectory: $(Build.SourcesDirectory)

  - bash: node .ai/automation/eval/run.js --all --tier2
    displayName: "Run Tier 2 LLM judge (non-blocking)"
    workingDirectory: $(Build.SourcesDirectory)
    continueOnError: true
    env:
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
