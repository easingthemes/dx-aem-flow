name: Generate Marketing Content

# Generates social media drafts from TLDR tips using Claude API
# Creates a PR with drafts for human review before posting

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:
    inputs:
      tip_file:
        description: 'Specific tip file to process (leave empty for next in queue)'
        required: false
      limit:
        description: 'Number of queue items to process'
        required: false
        default: '3'

jobs:
  generate-drafts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.tip_file }}" ]; then
            # Process specific file
            bash scripts/marketing/generate-posts.sh "${{ github.event.inputs.tip_file }}"
          else
            # Process next pending items from queue
            LIMIT="${{ github.event.inputs.limit || '3' }}"
            bash scripts/marketing/batch-generate.sh --limit "$LIMIT"
          fi

      - name: Check for new drafts
        id: check
        run: |
          if [ -n "$(git status --porcelain docs/marketing/drafts/)" ]; then
            echo "has_drafts=true" >> $GITHUB_OUTPUT
          else
            echo "has_drafts=false" >> $GITHUB_OUTPUT
            echo "No new drafts generated."
          fi

      - name: Create PR with drafts
        if: steps.check.outputs.has_drafts == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "content: weekly social media drafts"
          body: |
            ## Auto-generated marketing drafts

            Review the posts in `docs/marketing/drafts/` before publishing.

            **Workflow:**
            1. Review and edit drafts in this PR
            2. Merge when ready
            3. Manually post to platforms (or use `scripts/marketing/post-to-devto.sh`)

            Generated by the marketing content pipeline.
          branch: marketing/weekly-content
          commit-message: "content: generate social media drafts from TLDR tips"
          delete-branch: true
